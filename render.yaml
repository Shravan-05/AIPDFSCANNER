services:
  - type: web
    name: aipdfscanner
    env: node
    plan: starter
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disks:
      - name: uploads
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OLLAMA_API_URL
        value: http://ollama:11434
      - key: OLLAMA_MODEL
        value: llama3.2:1b

  - type: private
    name: ollama
    env: docker
    dockerfilePath: ./ollama.Dockerfile
    plan: starter
    autoDeploy: true
    disks:
      - name: ollama-models
        mountPath: /root/.ollama/models
        sizeGB: 10
    envVars:
      - key: OLLAMA_HOST
        value: 0.0.0.0
      - key: OLLAMA_MODEL
        value: llama3.2:1b
      - key: OLLAMA_KEEP_ALIVE
        value: 24h
